server.port=8080

spring.application.name=telegram-bot

telegram.bot-token=${TELEGRAM_BOT_TOKEN}
telegram.api-base-url=${TELEGRAM_API_BASE_URL:https://api.telegram.org}
telegram.max-send-attempts=${TELEGRAM_MAX_SEND_ATTEMPTS:4}
telegram.default-retry-after-millis=${TELEGRAM_DEFAULT_RETRY_AFTER_MILLIS:1000}
telegram.queue.capacity=${TELEGRAM_QUEUE_CAPACITY:1000}
telegram.queue.workers=${TELEGRAM_QUEUE_WORKERS:2}
telegram.queue.enqueue-timeout-millis=${TELEGRAM_QUEUE_ENQUEUE_TIMEOUT_MILLIS:250}

logging.level.root=INFO
logging.level.com.piipiets.telegrambot=DEBUG
